<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Jobs · JobRecruit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1><i class="fas fa-briefcase"></i> Explore Opportunities</h1>

        <nav>
            <!-- <a href="index.html"><i class="fas fa-home"></i> Home</a> -->
            <a href="jobs.html"><i class="fas fa-search"></i> Jobs</a>
            <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <!-- <a href="admin.html"><i class="fas fa-crown"></i> Admin</a> -->
            <!-- <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
            <a href="register.html"><i class="fas fa-user-plus"></i> Register</a> -->
            <a href="#" onclick="logout()"><i class="fas fa-power-off"></i> Logout</a>
        </nav>

        <div style="display: flex; gap: 1rem; align-items: center; background: white; padding: 1rem; border-radius: 60px; box-shadow: 0 10px 30px -10px rgba(102, 126, 234, 0.2);">
            <i class="fas fa-search" style="color: #667eea; margin-left: 1rem;"></i>
            <input id="search" placeholder="Search jobs by title..." style="border: none; margin: 0; max-width: none; flex: 1;">
            <button onclick="searchJobs()" style="margin: 0;"><i class="fas fa-magnifying-glass"></i> Search</button>
        </div>

        <div id="jobsContainer" class="card-grid"></div>

        <h2 style="margin-top: 3rem;"><i class="fas fa-bookmark"></i> Saved Jobs</h2>
        <ul id="savedJobs">
            <li><i class="fas fa-star" style="color: #fbbf24;"></i> Your saved jobs will appear here</li>
        </ul>

        <footer>
            <i class="fas fa-copyright"></i> 2024 JobRecruit · Find your perfect match
        </footer>
    </div>

    <script src="jobs.js"></script>
    <script src="app.js"></script>

</body>
</html>
