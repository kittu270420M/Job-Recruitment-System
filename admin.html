<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel · JobRecruit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1><i class="fas fa-crown"></i> Admin Panel</h1>

        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="jobs.html"><i class="fas fa-search"></i> Jobs</a>
            <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <!-- <a href="admin.html"><i class="fas fa-crown"></i> Admin</a> -->
            <!-- <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
            <a href="register.html"><i class="fas fa-user-plus"></i> Register</a> -->
            <a href="#" onclick="logout()"><i class="fas fa-power-off"></i> Logout</a>
        </nav>

        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem;">
            <div style="background: white; border-radius: 48px; padding: 2rem; box-shadow: 0 20px 40px -15px rgba(102, 126, 234, 0.2);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <div style="width: 50px; height: 50px; background: linear-gradient(145deg, #667eea, #764ba2); border-radius: 20px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-users" style="color: white; font-size: 1.5rem;"></i>
                    </div>
                    <h3 style="margin: 0;">Users</h3>
                </div>
                <ul id="users"></ul>
            </div>
            
            <div style="background: white; border-radius: 48px; padding: 2rem; box-shadow: 0 20px 40px -15px rgba(102, 126, 234, 0.2);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <div style="width: 50px; height: 50px; background: linear-gradient(145deg, #667eea, #764ba2); border-radius: 20px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-briefcase" style="color: white; font-size: 1.5rem;"></i>
                    </div>
                    <h3 style="margin: 0;">Jobs</h3>
                </div>
                <ul id="jobs"></ul>
            </div>
            
            <div style="background: white; border-radius: 48px; padding: 2rem; box-shadow: 0 20px 40px -15px rgba(102, 126, 234, 0.2);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                    <div style="width: 50px; height: 50px; background: linear-gradient(145deg, #667eea, #764ba2); border-radius: 20px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-file-pdf" style="color: white; font-size: 1.5rem;"></i>
                    </div>
                    <h3 style="margin: 0;">Resumes</h3>
                </div>
                <ul id="resumeList"></ul>
            </div>
        </div>

        <footer>
            <i class="fas fa-copyright"></i> 2024 JobRecruit · Administrative access
        </footer>
    </div>

    <script src="admin.js"></script>
</body>
</html>
