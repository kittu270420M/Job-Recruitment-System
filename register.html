        <div style="max-width: 500px; margin: 0 auto; background: white; padding: 3rem; border-radius: 60px; box-shadow: 0 30px 50px -20px rgba(102, 126, 234, 0.3);">

            <input id="name" placeholder="Full Name">

            <br>
