<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job · JobRecruit</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1><i class="fas fa-pen-to-square"></i> Post New Job</h1>

        <nav>
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="jobs.html"><i class="fas fa-search"></i> Jobs</a>
            <a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
            <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
            <!-- <a href="admin.html"><i class="fas fa-crown"></i> Admin</a>
            <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
            <a href="register.html"><i class="fas fa-user-plus"></i> Register</a> -->
            <a href="#" onclick="logout()"><i class="fas fa-power-off"></i> Logout</a>
        </nav>

        <div style="display: flex; flex-direction: column; align-items: center; max-width: 600px; margin: 2rem auto; background: white; padding: 3rem; border-radius: 60px; box-shadow: 0 30px 50px -20px rgba(102, 126, 234, 0.3);">
            <div style="text-align: center; margin-bottom: 2rem;">
                <i class="fas fa-building" style="font-size: 4rem; background: linear-gradient(145deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
            </div>
            
            <input id="title" placeholder="Job Title (e.g. Senior Developer)">
            <input id="company" placeholder="Company Name">
            <input id="location" placeholder="Location (e.g. Remote, NYC)">
            <button onclick="postJob()" style="width: 90%;"><i class="fas fa-cloud-arrow-up"></i> Post Job Opportunity</button>
            <p style="text-align: center; margin-top: 1rem;"><i class="fas fa-lock" style="color: #10b981;"></i> Only recruiters can post jobs</p>
        </div>

        <footer>
            <i class="fas fa-copyright"></i> 2026 JobRecruit · Hire the best talent
        </footer>
    </div>

    <script src="recruiter.js"></script>
    <script src="app.js"></script>

</body>
</html>
