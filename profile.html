<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Profile · JobRecruit</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app-container">

<h1><i class="fas fa-id-card"></i> Your Profile</h1>

<nav>

<!-- <a href="index.html"><i class="fas fa-home"></i> Home</a> -->
<a href="jobs.html"><i class="fas fa-search"></i> Jobs</a>
<a href="profile.html"><i class="fas fa-user-circle"></i> Profile</a>
<a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
<!-- <a href="admin.html"><i class="fas fa-crown"></i> Admin</a> -->
<!-- <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login</a>
<a href="register.html"><i class="fas fa-user-plus"></i> Register</a> -->
<a href="#" onclick="logout()"><i class="fas fa-power-off"></i> Logout</a>

</nav>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">

<!-- PROFILE CARD -->

<div style="background:white;border-radius:48px;padding:2rem;box-shadow:0 20px 40px -15px rgba(102,126,234,0.2);">

<div style="display:flex;align-items:center;gap:2rem;margin-bottom:2rem;">

<div style="width:80px;height:80px;background:linear-gradient(145deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;overflow:hidden;">

<img id="profileImage" style="width:100%;height:100%;object-fit:cover;display:none">

<i id="defaultIcon" class="fas fa-user" style="font-size:3rem;color:white;"></i>

</div>

<div>

<p style="font-size:0.9rem;color:#667eea;font-weight:600;">MEMBER SINCE 2024</p>

<p><strong>Name:</strong> <span id="userName"></span></p>

<p><strong>Email:</strong> <span id="userEmail"></span></p>

<button onclick="editProfile()">Edit Profile</button>

</div>

</div>

<h3>Profile Image</h3>

<input type="file" id="imageUpload">

<button onclick="uploadImage()">Upload Image</button>

<br><br>

<div class="resume-upload-area">

<i class="fas fa-cloud-upload-alt"></i>

<h3>Upload Resume</h3>

<input type="file" id="resumeFile">

<button onclick="uploadResume()">Upload Resume</button>

<p id="resumeStatus"></p>

</div>

</div>

<!-- APPLICATIONS -->

<div style="background:white;border-radius:48px;padding:2rem;box-shadow:0 20px 40px -15px rgba(102,126,234,0.2);">

<h3><i class="fas fa-file-signature"></i> My Applications</h3>

<ul id="applications"></ul>

</div>

</div>

<footer>

<i class="fas fa-copyright"></i> 2024 JobRecruit · Your career hub

</footer>

</div>

<script src="app.js"></script>
<script src="app.js"></script>

</body>
</html>
